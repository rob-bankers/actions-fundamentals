name: GitHub Actions Demo

on:
  push:
    branches:
      - 'main'
    paths-ignore:
      - '.github'
  pull_request:
    types:
      - opened
    branches:
      - 'main'
  schedule:
     - cron: "15 6 * * 0"
  workflow_dispatch:

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "GitHub event name: [${GITHUB_EVENT_NAME}]"
          echo "GitHub branch: [${GITHUB_REF_NAME}]"
      - uses: actions/checkout@v7
      - run: |
          tree
